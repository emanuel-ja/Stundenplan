<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stundenplan-Planer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-top">
                    <h2 style="margin: 0;">Fächerwahl</h2>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-pdf" onclick="exportPDF()">Druck<br>PDF</button>
                        <button class="btn-reset" onclick="resetSchedule()">Reset</button>
                    </div>
                </div>
                <div class="sidebar-header-bottom">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label class="switch">
                            <input type="checkbox" id="allow-overlap-chk" onchange="toggleAllowOverlap()" checked>
                            <span class="slider"></span>
                        </label>
                        <label for="allow-overlap-chk"
                            style="font-size: 0.9rem; cursor: pointer; user-select: none;">Überschneidung
                            zulassen</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                        <label class="switch">
                            <input type="checkbox" id="only-presence-chk" onchange="toggleOnlyPresence()" checked>
                            <span class="slider"></span>
                        </label>
                        <label for="only-presence-chk" style="font-size: 0.9rem; cursor: pointer; user-select: none;">
                            Fernstudien-Module</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                        <label class="switch">
                            <input type="checkbox" id="no-quereinsteiger-chk" onchange="toggleNoQuereinsteiger()"
                                checked>
                            <span class="slider"></span>
                        </label>
                        <label for="no-quereinsteiger-chk"
                            style="font-size: 0.9rem; cursor: pointer; user-select: none;">
                            Quereinsteiger-Module</label>
                    </div>
                </div>
            </div>
            <div id="accordion-container">
                <div class="category">
                    <button class="accordion-header main-cat"
                        onclick="toggleAccordion('pflicht-content')">Pflichtfächer</button>
                    <div id="pflicht-content" class="accordion-content"></div>
                </div>
                <div class="category">
                    <button class="accordion-header main-cat"
                        onclick="toggleAccordion('frei-content')">Freigegenstände</button>
                    <div id="frei-content" class="accordion-content"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div id="combination-controls" class="combo-ui hidden">
                    <div class="combo-nav">
                        <button onclick="prevCombo()">❮</button>
                        <span id="combo-info">Kombinationen</span>
                        <button onclick="nextCombo()">❯</button>
                    </div>
                    <button class="btn-apply" onclick="applyCurrentCombo()">Diese Auswahl übernehmen</button>
                </div>
                <div id="current-status">Wähle Module oder "Beliebiges..."</div>
            </header>

            <div class="schedule-container">
                <div class="schedule-grid" id="schedule-grid">
                    <div class="grid-cell header">Zeit</div>
                    <div class="grid-cell header">Mo</div>
                    <div class="grid-cell header">Di</div>
                    <div class="grid-cell header">Mi</div>
                    <div class="grid-cell header">Do</div>
                    <div class="grid-cell header">Fr</div>
                </div>
            </div>

            <div id="pdf-module-list">
                <h3>Gewählte Module</h3>
                <ul id="print-modules"></ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
